

services:

  # ============================================================
  # SERVICE 1: PostgreSQL Database
  # ============================================================
  db:
    image: postgres:15
    container_name: task_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - task-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # SERVICE 2: FastAPI Backend
  # ============================================================
  backend:
    build: ./backend
    container_name: task_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/taskdb
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task-network
    volumes:
      - ./backend:/app

  # ============================================================
  # SERVICE 3: React Frontend
  # ============================================================
  frontend:
    build: ./frontend
    container_name: task_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - task-network
    volumes:
      - ./frontend/src:/app/src

# ============================================================
# VOLUMES — Persistent Storage
# ============================================================
volumes:
  postgres_data:

# ============================================================
# NETWORKS — How containers talk to each other
# ============================================================
networks:
  task-network:
    driver: bridge