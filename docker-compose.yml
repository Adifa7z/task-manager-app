services:

  db:
    image: postgres:15
    container_name: task_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - task-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: task_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/taskdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task-network
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: task_frontend
    depends_on:
      - backend
    networks:
      - task-network
    volumes:
      - ./frontend/src:/app/src

  # NEW: Nginx service
  nginx:
    image: nginx:alpine
    container_name: task_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - task-network

volumes:
  postgres_data:

networks:
  task-network:
    driver: bridge